services:
  - type: web
    name: lvmh-grey-market-intelligence
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt -r requirements-deploy.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: LVMH_AUTO_INIT_DB
        value: "1"
      - key: FLASK_DEBUG
        value: "0"
